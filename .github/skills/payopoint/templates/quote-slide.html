<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Template - Quote/Testimonial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }

        /* Dark mode (default) */
        :root {
            --body-bg: #0a0e1a;
            --slide-bg: linear-gradient(135deg, #0a2f35 0%, #0f1e3d 50%, #1a1438 100%);
            --slide-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 10px 30px rgba(0,0,0,0.3);
            --blob-tl-bg: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
            --blob-tl-opacity: 0.4;
            --blob-tr-bg: linear-gradient(225deg, #8b5cf6 0%, #a855f7 100%);
            --blob-tr-opacity: 0.3;
            --blob-bottom-bg: linear-gradient(45deg, #0891b2 0%, #0284c7 50%, #3b82f6 100%);
            --blob-bottom-opacity: 0.35;
            --blob-accent-bg: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            --blob-accent-opacity: 0.25;
            --content-bg: transparent;
            --title-gradient: linear-gradient(90deg, #38bdf8 0%, #a78bfa 50%, #f0abfc 100%);
            --text-primary: #ffffff;
            --text-secondary: #e5e7eb;
            --text-muted: #9ca3af;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --logo-text-color: #ffffff;
        }

        /* Light mode */
        :root.light-mode {
            --body-bg: #e5e7eb;
            --slide-bg: white;
            --slide-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 10px 30px rgba(0,0,0,0.1);
            --blob-tl-bg: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --blob-tl-opacity: 0.9;
            --blob-tr-bg: linear-gradient(225deg, #a855f7 0%, #ec4899 100%);
            --blob-tr-opacity: 0.9;
            --blob-bottom-bg: linear-gradient(45deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            --blob-bottom-opacity: 0.85;
            --blob-accent-bg: linear-gradient(135deg, #fbbf24 0%, #f472b6 100%);
            --blob-accent-opacity: 0.7;
            --content-bg: radial-gradient(ellipse at center, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --title-gradient: linear-gradient(90deg, #0099e6 0%, #8b5cf6 50%, #e94b9e 100%);
            --text-primary: #1f2937;
            --text-secondary: #374151;
            --text-muted: #6b7280;
            --card-bg: rgba(0, 0, 0, 0.03);
            --card-border: rgba(0, 0, 0, 0.1);
            --logo-text-color: #2d3748;
        }

        body {
            font-family: 'Avenir Next LT Pro', 'Avenir Next', 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--body-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
            transition: background 0.3s ease;
        }

        .slide-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .slide {
            width: 1920px;
            height: 1080px;
            background: var(--slide-bg);
            position: relative;
            overflow: hidden;
            box-shadow: var(--slide-shadow);
            transform: scale(0.65);
            border-radius: 8px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        @media (max-width: 1000px) { .slide { transform: scale(0.45); } }
        @media (min-width: 1400px) { .slide { transform: scale(0.7); } }
        @media (min-width: 1920px) { .slide { transform: scale(0.95); } }

        /* Decorative gradient blobs */
        .blob-top-left {
            position: absolute;
            top: -300px;
            left: -300px;
            width: 800px;
            height: 800px;
            background: var(--blob-tl-bg);
            border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
            opacity: var(--blob-tl-opacity);
            filter: blur(80px);
            transition: opacity 0.3s ease;
        }

        .blob-top-right {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 700px;
            height: 700px;
            background: var(--blob-tr-bg);
            border-radius: 50% 40% 60% 40% / 40% 50% 40% 60%;
            opacity: var(--blob-tr-opacity);
            filter: blur(80px);
            transition: opacity 0.3s ease;
        }

        .blob-bottom {
            position: absolute;
            bottom: -250px;
            left: 20%;
            width: 900px;
            height: 600px;
            background: var(--blob-bottom-bg);
            border-radius: 60% 40% 50% 50% / 40% 60% 50% 50%;
            opacity: var(--blob-bottom-opacity);
            filter: blur(90px);
            transition: opacity 0.3s ease;
        }

        .blob-accent-pink {
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: var(--blob-accent-bg);
            border-radius: 50%;
            opacity: var(--blob-accent-opacity);
            filter: blur(70px);
            transition: opacity 0.3s ease;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            background: var(--content-bg);
            transition: background 0.3s ease;
        }

        .content-inner {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 150px;
        }

        /* Quote styling */
        .quote-container {
            max-width: 1400px;
            text-align: center;
        }

        .quote-mark {
            font-size: 180px;
            font-weight: 700;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 0.5;
            margin-bottom: 20px;
        }

        .quote-mark.close {
            margin-top: 20px;
            margin-bottom: 0;
        }

        .quote-text {
            font-size: 52px;
            font-weight: 500;
            font-style: italic;
            color: var(--text-primary);
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        .attribution {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .attribution-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 3px solid;
            border-image: var(--title-gradient) 1;
            border-image-slice: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attribution-photo svg {
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }

        .attribution-info {
            text-align: left;
        }

        .attribution-name {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }

        .attribution-title {
            font-size: 20px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .company-logo {
            width: 120px;
            height: 50px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 30px;
        }

        .company-logo span {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 50px;
            left: 60px;
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 36px;
            font-weight: 400;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
        }

        .logo-text {
            font-family: 'Avenir Next LT Pro', 'Avenir Next', sans-serif;
            color: var(--logo-text-color);
            font-weight: 500;
            letter-spacing: -0.5px;
            font-size: 32px;
            transition: color 0.3s ease;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        :root.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        :root.light-mode .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.15);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover svg {
            transform: rotate(15deg);
        }

        .icon-moon { display: block; }
        .icon-sun { display: none; }
        :root.light-mode .icon-moon { display: none; }
        :root.light-mode .icon-sun { display: block; }
        /* Navigation Arrow */
        .nav-arrow {
            position: absolute;
            bottom: 50px;
            right: 60px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0099e6 0%, #8b5cf6 50%, #e94b9e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-arrow:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .nav-arrow svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="#a78bfa" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <div class="slide-wrapper">
    <div class="slide">
        <!-- Gradient blobs -->
        <div class="blob-top-left"></div>
        <div class="blob-top-right"></div>
        <div class="blob-bottom"></div>
        <div class="blob-accent-pink"></div>

        <!-- Content -->
        <div class="content"></div>
        <div class="content-inner">
            <div class="quote-container">
                <div class="quote-mark">"</div>
                <p class="quote-text">
                    This solution transformed how we handle international payments. 
                    Our processing time decreased by 60% and customer satisfaction 
                    reached an all-time high.
                </p>
                <div class="quote-mark close">"</div>
                <div class="attribution" style="margin-top: 40px;">
                    <div class="attribution-photo">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="attribution-info">
                        <div class="attribution-name">Sarah Johnson</div>
                        <div class="attribution-title">VP of Operations, Global Retail Inc.</div>
                    </div>
                    <div class="company-logo">
                        <span>Company Logo</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer with Payoneer Logo -->
        <div class="footer">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                            <stop offset="25%" style="stop-color:#f7931e;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#00c896;stop-opacity:1" />
                            <stop offset="75%" style="stop-color:#0099e6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#e94b9e;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#logoGradient)" stroke-width="12"/>
                </svg>
                <span class="logo-text">Payoneer</span>
            </div>
        </div>

        <!-- NAV_ARROW: Update href to next slide filename -->
        <a href="#NEXT_SLIDE" class="nav-arrow">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 18l6-6-6-6" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('light-mode');
            const isLight = document.documentElement.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
</body>
</html>
